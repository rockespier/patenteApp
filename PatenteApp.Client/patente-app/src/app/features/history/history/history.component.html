<div class="history-container">
  <div class="history-header">
    <p class="history-kicker">Progressi e risultati</p>
    <h1>Il mio storico</h1>
  </div>

  <div class="history-list" role="list" aria-label="Storico risultati simulazioni">
    @for (item of history(); track item.dateTaken) {
      <article class="history-card" [class.passed]="item.passed" [class.failed]="!item.passed" role="listitem">
        <div class="info">
          <h4>{{ item.passed ? 'Promosso' : 'Bocciato' }}</h4>
          <p>{{ item.dateTaken | date:'short' }}</p>
        </div>
        <div class="badge" [class.passed]="item.passed" [class.failed]="!item.passed">
          {{ item.errorsCount }} Errori
        </div>
      </article>
    } @empty {
      <p class="empty-state">Non hai ancora effettuato simulazioni.</p>
    }
  </div>

  <button class="btn-back" (click)="goBack()">
    Torna al quiz
  </button>
</div>
